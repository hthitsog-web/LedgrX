<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LedgrX</title>
  <!-- GitHub Pages SPA redirect: send all 404s back to index.html -->
  <script>
    // Store the path and redirect to index
    sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
    location.href = '/';
  </script>
</head>

</html>
